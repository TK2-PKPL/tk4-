{% extends "base.html" %}
{% block title %}Akses ditolak - {{ site_name }}{% endblock %}
{% block content %}
<section class="error-panel">
  <span class="eyebrow">403</span>
  <h1>Akses ditolak</h1>
  <p>{{ reason|default:"Anda tidak memiliki hak akses untuk membuka halaman atau menjalankan aksi ini." }}</p>
  <a class="btn btn-primary" href="{% url 'dashboard' %}">Kembali ke dashboard</a>
</section>
{% endblock %}
